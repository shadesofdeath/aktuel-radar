<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktüel Radar — BİM · A101 · ŞOK gerçek fiyat takibi</title>
<meta name="description" content="BİM, A101 ve ŞOK marketlerinin gerçek ürün fiyatlarını tek ekranda karşılaştır. Günlük güncellenen fiyatlar, birim fiyat ve arama.">
<meta name="theme-color" content="#0e1116">
<meta property="og:title" content="Aktüel Radar">
<meta property="og:description" content="BİM · A101 · ŞOK gerçek fiyatları tek ekranda.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F4F5F2;
    --paper-2: #ECEEE9;
    --card: #FFFFFF;
    --ink: #14171C;
    --muted: #6A727D;
    --faint: #99A0AA;
    --line: #E3E5E0;
    --tag: #FFD11A;
    --tag-ink: #191100;
    --bim: #E4001B;
    --a101: #0090C1;
    --sok: #F0A500;
    --sale: #E4001B;
    --radius: 16px;
    --shadow: 0 1px 2px rgba(20,23,28,.04), 0 8px 24px rgba(20,23,28,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0E1116;
      --paper-2: #141922;
      --card: #171D26;
      --ink: #EAEEF3;
      --muted: #8C95A1;
      --faint: #5C6672;
      --line: #232B36;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1200px 500px at 100% -10%, color-mix(in srgb, var(--a101) 8%, transparent), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, color-mix(in srgb, var(--bim) 7%, transparent), transparent 55%),
      var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  /* ---------- header ---------- */
  header {
    max-width: 1120px;
    margin: 0 auto;
    padding: 30px 18px 8px;
  }
  .brand-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .logo {
    font-family: "Anton", sans-serif;
    font-size: clamp(36px, 8.5vw, 60px);
    letter-spacing: .5px;
    line-height: .92;
    text-transform: uppercase;
  }
  .logo em {
    font-style: normal;
    background: var(--tag);
    color: var(--tag-ink);
    padding: 0 .16em;
    clip-path: polygon(0 10%, 100% 0, 98% 100%, 2% 92%);
    display: inline-block;
    transform: rotate(-1.5deg);
  }
  .badge-live {
    display: inline-flex; align-items: center; gap: 7px;
    font: 700 11px "Inter"; letter-spacing: .6px; text-transform: uppercase;
    color: var(--muted);
    background: var(--card); border: 1px solid var(--line);
    padding: 7px 12px; border-radius: 999px;
  }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: #16b364; box-shadow: 0 0 0 0 rgba(22,179,100,.5); animation: pulse 2s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 8px rgba(22,179,100,0); } 100% { box-shadow: 0 0 0 0 rgba(22,179,100,0); } }
  .tagline {
    margin-top: 12px; font-size: 13.5px; color: var(--muted);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .mk { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }
  .dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
  .dot.bim { background: var(--bim); } .dot.a101 { background: var(--a101); } .dot.sok { background: var(--sok); }

  /* ---------- toolbar ---------- */
  .toolbar { position: sticky; top: 0; z-index: 20; margin-top: 16px; }
  .toolbar::before {
    content: ""; position: absolute; inset: 0;
    background: color-mix(in srgb, var(--paper) 82%, transparent);
    backdrop-filter: blur(12px) saturate(1.2); -webkit-backdrop-filter: blur(12px) saturate(1.2);
    border-bottom: 1px solid var(--line);
  }
  .toolbar-inner {
    position: relative; max-width: 1120px; margin: 0 auto;
    padding: 12px 18px 14px; display: flex; flex-direction: column; gap: 11px;
  }
  .chips { display: flex; gap: 9px; overflow-x: auto; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; display: inline-flex; align-items: center; gap: 7px;
    border: 1.5px solid var(--line); background: var(--card); color: var(--ink);
    font: 600 13.5px "Inter"; padding: 8px 15px; border-radius: 999px; cursor: pointer;
    transition: transform .08s, background .15s, border-color .15s, color .15s;
    -webkit-tap-highlight-color: transparent; white-space: nowrap;
  }
  .chip .n { font-size: 11px; font-weight: 700; opacity: .6; }
  .chip:active { transform: scale(.95); }
  .chip[data-m="all"].on  { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip[data-m="bim"].on  { background: var(--bim); color: #fff; border-color: var(--bim); }
  .chip[data-m="a101"].on { background: var(--a101); color: #fff; border-color: var(--a101); }
  .chip[data-m="sok"].on  { background: var(--sok); color: #1c1400; border-color: var(--sok); }
  .chip.on .n { opacity: .85; }
  .row2 { display: flex; gap: 9px; }
  .search {
    flex: 1; display: flex; align-items: center; gap: 9px;
    background: var(--card); border: 1.5px solid var(--line); border-radius: 999px;
    padding: 0 15px; height: 44px; transition: border-color .15s, box-shadow .15s;
  }
  .search:focus-within { border-color: var(--a101); box-shadow: 0 0 0 4px color-mix(in srgb, var(--a101) 15%, transparent); }
  .search svg { flex: 0 0 auto; opacity: .45; }
  .search input {
    flex: 1; border: 0; outline: 0; background: transparent; color: var(--ink);
    font: 500 14.5px "Inter"; min-width: 0;
  }
  select {
    height: 44px; border: 1.5px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; font: 600 13px "Inter"; padding: 0 14px; outline: none; cursor: pointer;
  }
  .count { font-size: 12.5px; color: var(--muted); min-height: 15px; }
  .count b { color: var(--ink); }

  /* ---------- grid ---------- */
  main { max-width: 1120px; margin: 0 auto; padding: 18px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px;
  }
  @media (min-width: 640px) { .grid { grid-template-columns: repeat(auto-fill, minmax(196px, 1fr)); gap: 16px; } }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 10px 10px 14px; display: flex; flex-direction: column; gap: 4px;
    position: relative; overflow: hidden; box-shadow: var(--shadow);
    transition: transform .12s ease, box-shadow .18s ease, border-color .18s;
    animation: pop .28s ease backwards;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(20,23,28,.12); border-color: color-mix(in srgb, var(--mc) 40%, var(--line)); }
  .card::after { content: ""; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--mc); opacity: .9; }
  .card.bim  { --mc: var(--bim); } .card.a101 { --mc: var(--a101); } .card.sok  { --mc: var(--sok); }

  .thumb {
    position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 11px;
    background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .thumb img { width: 100%; height: 100%; object-fit: contain; }
  .thumb .ph { font: 800 13px "Inter"; color: #C9CDD3; letter-spacing: .5px; }
  .disc {
    position: absolute; top: 8px; left: 8px; z-index: 2;
    background: var(--sale); color: #fff; font: 800 12px "Inter"; letter-spacing: .3px;
    padding: 4px 8px; border-radius: 8px; box-shadow: 0 2px 8px rgba(228,0,27,.35);
  }
  .mk-badge {
    position: absolute; top: 8px; right: 8px; z-index: 2;
    background: var(--mc); color: #fff; font: 800 9.5px "Inter"; letter-spacing: .8px; text-transform: uppercase;
    padding: 4px 8px; border-radius: 7px;
  }
  .card.sok .mk-badge { color: #1c1400; }
  .info { padding: 4px 4px 0; display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .brand { font: 700 10.5px "Inter"; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; min-height: 13px; }
  .name { font: 600 13.5px/1.32 "Inter"; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .unit { font-size: 11.5px; color: var(--faint); }

  .price-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; margin-top: 8px; padding: 0 4px; }
  .tag {
    background: var(--tag); color: var(--tag-ink);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 11px 100%, 0 calc(100% - 11px));
    padding: 5px 13px 4px 12px; display: flex; align-items: baseline; font-family: "Anton", sans-serif;
  }
  .tag .lira { font-size: 13px; margin-right: 2px; }
  .tag .tam  { font-size: 25px; letter-spacing: .5px; }
  .tag .kurus { font-size: 13px; transform: translateY(-8px); margin-left: 1px; }
  .uprice { font: 500 10.5px "Inter"; color: var(--faint); text-align: right; line-height: 1.3; }

  /* ---------- skeleton ---------- */
  .sk { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; box-shadow: var(--shadow); }
  .sk .b { background: linear-gradient(90deg, var(--paper-2) 25%, color-mix(in srgb, var(--paper-2) 60%, var(--card)) 37%, var(--paper-2) 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: 8px; }
  .sk .b1 { aspect-ratio: 1/1; margin-bottom: 10px; } .sk .b2 { height: 11px; width: 55%; margin: 6px 4px; } .sk .b3 { height: 13px; width: 85%; margin: 6px 4px; } .sk .b4 { height: 26px; width: 45%; margin: 12px 4px 4px; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* ---------- states ---------- */
  .empty { grid-column: 1/-1; padding: 56px 16px; text-align: center; color: var(--muted); font-size: 14.5px; line-height: 1.7; }
  .empty .big { font-size: 40px; margin-bottom: 10px; }
  .empty b { color: var(--ink); }
  footer { max-width: 1120px; margin: 0 auto; padding: 26px 18px 48px; font-size: 12.5px; color: var(--muted); line-height: 1.7; border-top: 1px solid var(--line); margin-top: 12px; }
  footer .upd { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  footer .pill { background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; font-size: 11.5px; }
  footer .pill b { color: var(--ink); }
  .chip:focus-visible, .card:focus-visible, select:focus-visible { outline: 2px solid var(--a101); outline-offset: 2px; }
</style>
</head>
<body>

<header>
  <div class="brand-row">
    <h1 class="logo">Aktüel <em>Radar</em></h1>
    <span class="badge-live"><span class="pulse"></span> Canlı fiyatlar</span>
  </div>
  <p class="tagline">
    <span class="mk"><span class="dot bim"></span> BİM</span>
    <span class="mk"><span class="dot a101"></span> A101</span>
    <span class="mk"><span class="dot sok"></span> ŞOK</span>
    <span>· gerçek market fiyatları tek ekranda</span>
  </p>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="chips" id="chips">
      <button class="chip on" data-m="all">Tümü <span class="n" id="n-all"></span></button>
      <button class="chip" data-m="bim">BİM <span class="n" id="n-bim"></span></button>
      <button class="chip" data-m="a101">A101 <span class="n" id="n-a101"></span></button>
      <button class="chip" data-m="sok">ŞOK <span class="n" id="n-sok"></span></button>
    </div>
    <div class="row2">
      <label class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="q" type="search" placeholder="Ürün veya marka ara…" autocomplete="off">
      </label>
      <select id="sort" aria-label="Sıralama">
        <option value="asc">Fiyat ↑ (ucuz)</option>
        <option value="desc">Fiyat ↓ (pahalı)</option>
        <option value="az">A → Z</option>
      </select>
    </div>
    <div class="count" id="count"></div>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <div class="upd" id="upd"></div>
  <div>
    Fiyatlar T.C. Ticaret Bakanlığı Market Fiyatı servisinden otomatik derlenir; bilgilendirme amaçlıdır.
    Fiyat farkı olursa mağaza fiyatı geçerlidir. Kaynak:
    <a href="https://marketfiyati.org.tr" target="_blank" rel="noopener"><b>marketfiyati.org.tr</b></a>
  </div>
</footer>

<script>
const MARKETS = { bim: "BİM", a101: "A101", sok: "ŞOK" };
const state = { market: "all", q: "", sort: "asc", items: [], meta: {} };

const trFmt = new Intl.NumberFormat("tr-TR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const trLower = s => (s || "").toLocaleLowerCase("tr-TR");
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function skeleton() {
  document.getElementById("grid").innerHTML = Array.from({ length: 12 }, () =>
    `<div class="sk"><div class="b b1"></div><div class="b b2"></div><div class="b b3"></div><div class="b b4"></div></div>`
  ).join("");
}

async function load() {
  skeleton();
  const bust = Date.now();
  const results = await Promise.allSettled(
    Object.keys(MARKETS).map(m =>
      fetch(`data/${m}.json?v=${bust}`).then(r => { if (!r.ok) throw 0; return r.json(); }).then(d => ({ m, d }))
    )
  );
  for (const r of results) {
    if (r.status !== "fulfilled") continue;
    const { m, d } = r.value;
    state.meta[m] = { updatedAt: d.updatedAt, count: (d.products || []).length };
    for (const p of d.products || []) state.items.push({ ...p, market: m });
  }
  renderMeta();
  renderCounts();
  render();
}

function renderCounts() {
  document.getElementById("n-all").textContent = state.items.length || "";
  for (const m of Object.keys(MARKETS)) {
    document.getElementById("n-" + m).textContent = state.meta[m]?.count || "";
  }
}

function renderMeta() {
  document.getElementById("upd").innerHTML = Object.entries(MARKETS).map(([m, label]) => {
    const meta = state.meta[m];
    const t = meta?.updatedAt
      ? new Date(meta.updatedAt).toLocaleString("tr-TR", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })
      : "bekleniyor";
    return `<span class="pill"><b>${label}</b> · ${t}</span>`;
  }).join("");
}

function filtered() {
  let list = state.items;
  if (state.market !== "all") list = list.filter(p => p.market === state.market);
  if (state.q) {
    const q = trLower(state.q);
    list = list.filter(p => trLower(p.name + " " + (p.brand || "")).includes(q));
  }
  const s = state.sort;
  list = [...list];
  if (s === "desc") list.sort((a, b) => b.price - a.price);
  else if (s === "az") list.sort((a, b) => a.name.localeCompare(b.name, "tr"));
  else list.sort((a, b) => a.price - b.price);
  return list;
}

function priceTag(price) {
  const [tam, kurus] = trFmt.format(price).split(",");
  return `<span class="tag"><span class="lira">₺</span><span class="tam">${tam}</span><span class="kurus">,${kurus}</span></span>`;
}

function card(p, i) {
  const img = p.image
    ? `<img src="${esc(p.image)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<span class=ph>${esc(MARKETS[p.market])}</span>'">`
    : `<span class="ph">${esc(MARKETS[p.market])}</span>`;
  const uprice = p.unitPrice ? `<span class="uprice">${esc(p.unitPrice)}</span>` : "";
  const style = `style="animation-delay:${Math.min(i, 24) * 14}ms"`;
  return `
    <article class="card ${p.market}" ${style}>
      <div class="thumb"><span class="mk-badge">${esc(MARKETS[p.market])}</span>${img}</div>
      <div class="info">
        <span class="brand">${esc(p.brand)}</span>
        <span class="name">${esc(p.name)}</span>
        ${p.unit ? `<span class="unit">${esc(p.unit)}</span>` : ""}
      </div>
      <div class="price-row">${priceTag(p.price)}${uprice}</div>
    </article>`;
}

function render() {
  const list = filtered();
  const grid = document.getElementById("grid");
  document.getElementById("count").innerHTML = list.length
    ? `<b>${list.length}</b> ürün listeleniyor`
    : "";

  if (!list.length) {
    const anyData = state.items.length > 0;
    grid.innerHTML = `<div class="empty">
      <div class="big">${anyData ? "🔍" : "📡"}</div>
      ${anyData
        ? (state.q ? `"<b>${esc(state.q)}</b>" için sonuç yok.<br>Farklı bir kelime dene.` : `Bu markette ürün bulunamadı.`)
        : `<b>Veriler henüz yüklenmedi.</b><br>Otomatik güncelleme (GitHub Actions) ilk çalıştığında ürünler burada listelenecek.`}
    </div>`;
    return;
  }
  grid.innerHTML = list.slice(0, 500).map(card).join("");
}

document.getElementById("chips").addEventListener("click", e => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
  btn.classList.add("on");
  state.market = btn.dataset.m;
  render();
});
document.getElementById("q").addEventListener("input", e => { state.q = e.target.value.trim(); render(); });
document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; render(); });

load();
</script>
</body>
</html>
